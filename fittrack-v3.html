<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FitTrack"/>
<meta name="theme-color" content="#0F172A"/>
<title>FitTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0F172A;--bgCard:#172036;--bgHi:#1E2A44;--bgXHi:#243352;
  --text:#E5E7EB;--dim:#94A3B8;--faint:#64748B;
  --border:#1E293B;--borderHi:#334155;
  --blue:#3B82F6;--blueDim:rgba(59,130,246,0.18);--blueGlow:rgba(59,130,246,0.3);
  --green:#22C55E;--greenDim:rgba(34,197,94,0.15);
  --red:#EF4444;--redDim:rgba(239,68,68,0.15);
  --yellow:#FACC15;--yellowDim:rgba(250,204,21,0.12);
  --purple:#8B5CF6;--pink:#EC4899;--orange:#F97316;--teal:#06B6D4;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);overflow:hidden;overscroll-behavior:none;}
#app{
  font-family:'Manrope',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;max-width:440px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  padding-top:env(safe-area-inset-top);
}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:16px 18px;}
.page::-webkit-scrollbar{display:none;}
.display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;}
.mono{font-family:'JetBrains Mono',monospace;}
button{cursor:pointer;border:none;background:transparent;color:inherit;font-family:inherit;font-size:inherit;padding:0;}
button:active{transform:scale(.95);transition:transform .08s;}
input{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:inherit;outline:none;width:100%;}
input::-webkit-inner-spin-button{-webkit-appearance:none;}
.card{background:var(--bgCard);border:1px solid var(--border);border-radius:18px;padding:16px;}
.card-hi{background:var(--bgHi);border-radius:14px;padding:12px;}
#nav{
  background:rgba(15,23,42,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  flex-shrink:0;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;position:relative;}
.nav-dot{position:absolute;top:0;width:18px;height:2.5px;background:var(--blue);border-radius:2px;display:none;}
.nav-btn.active .nav-dot{display:block;}
.nav-btn span{font-size:9px;font-weight:600;letter-spacing:.2px;color:var(--faint);}
.nav-btn.active span{color:var(--blue);font-weight:700;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:440px;background:var(--bg);border-radius:22px 22px 0 0;padding:14px 18px;padding-bottom:calc(24px + env(safe-area-inset-bottom));animation:slideUp .28s cubic-bezier(.16,1,.3,1);}
.drag{width:34px;height:3px;background:var(--borderHi);border-radius:2px;margin:0 auto 14px;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 0 0 var(--blueGlow),0 8px 32px var(--blueGlow);}
  50%{box-shadow:0 0 0 10px rgba(59,130,246,0),0 12px 40px var(--blueGlow);}
}
.su{animation:slideUp .35s cubic-bezier(.16,1,.3,1) both;}
.label{font-size:10px;color:var(--faint);font-weight:800;letter-spacing:.8px;text-transform:uppercase;}
.badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.tag{background:var(--bgHi);border-radius:7px;padding:2px 7px;font-size:10px;color:var(--dim);font-weight:600;}
.btn-p{background:var(--blue);color:#fff;padding:14px;border-radius:13px;font-weight:700;font-size:15px;text-align:center;display:block;width:100%;}
.btn-s{background:var(--bgHi);color:var(--text);padding:14px;border-radius:13px;font-weight:700;font-size:15px;text-align:center;display:block;width:100%;}
.status{border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;animation:slideUp .2s;}
.status.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.status.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.status.loading{background:var(--blueDim);border:1px solid rgba(59,130,246,.3);color:var(--blue);}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--blue);border-top-color:transparent;animation:spin .8s linear infinite;flex-shrink:0;}
.glow-bg{position:fixed;top:0;left:0;right:0;max-width:440px;margin:0 auto;height:280px;background:radial-gradient(ellipse at top,var(--blueGlow) 0%,transparent 70%);pointer-events:none;z-index:0;}
</style>
</head>
<body>
<div id="app">
  <div class="glow-bg"></div>
  <div id="sw" style="position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
  <div id="nav"></div>
</div>
<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS & EXERCISE LIBRARY
// ══════════════════════════════════════════════════════
const SAVE_KEY  = 'ft_v4';
const SESS_KEY  = 'ft_session';
const REST_KEY  = 'ft_rest';
const CLOUD_KEY = 'ft_cloud';

const TYPE_INFO = {
  Push:    {color:'var(--blue)',   icon:'B', short:'Chest · Shoulders · Triceps'},
  Pull:    {color:'var(--purple)', icon:'P', short:'Back · Biceps · Rear Delts'},
  Legs:    {color:'var(--pink)',   icon:'L', short:'Quads · Hamstrings · Glutes'},
  Upper:   {color:'var(--teal)',   icon:'U', short:'Full Upper Body'},
  Lower:   {color:'var(--orange)',icon:'W', short:'Full Lower Body'},
  Crossfit:{color:'var(--red)',    icon:'X', short:'WOD · AMRAP · EMOM'},
  Running: {color:'var(--green)',  icon:'R', short:'Distance · Pace · Time'},
  Rest:    {color:'var(--faint)',  icon:'-', short:'Recovery Day'},
};
const TYPE_EMOJI = {Push:'💪',Pull:'🎯',Legs:'🦵',Upper:'⬆',Lower:'⬇',Crossfit:'🔥',Running:'🏃',Rest:'🌙'};

const EXERCISES = [
  'Bench Press','Incline DB Press','Decline Press','Cable Fly','Chest Dips',
  'Overhead Press','Arnold Press','Lateral Raise','Front Raise',
  'Tricep Dips','Skull Crushers','Tricep Pushdown','Close-Grip Bench',
  'Deadlift','Barbell Row','Pull-ups','Lat Pulldown','Seated Row',
  'Face Pulls','Rear Delt Fly','Bicep Curl','Hammer Curl','Preacher Curl',
  'Back Squat','Front Squat','Romanian Deadlift','Leg Press',
  'Leg Curl','Leg Extension','Hip Thrust','Calf Raise',
  'Bulgarian Split Squat','Walking Lunges','Plank','Ab Wheel',
];

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
const today = () => new Date().toISOString().split('T')[0];
const ago = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; };
const fmtDur = s => { s=Math.max(0,s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };
const calcPace = (km,min) => { if(!km||!min) return '--:--'; const p=min/km,w=Math.floor(p); return `${w}:${String(Math.round((p-w)*60)).padStart(2,'0')}`; };
const calcSleep = (bed,wake) => { if(!bed||!wake) return 0; const [bh,bm]=bed.split(':').map(Number),[wh,wm]=wake.split(':').map(Number); let m=(wh*60+wm)-(bh*60+bm); if(m<0)m+=1440; return m/60; };
const volOf = items => items.filter(i=>i.kind==='strength').reduce((a,ex)=>a+ex.sets.filter(s=>s.done).reduce((x,s)=>x+(s.w||0)*(s.r||0),0),0);
const setsOf = items => items.filter(i=>i.kind==='strength').reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
const suggestNext = hist => { const rot=['Push','Pull','Legs','Push','Pull','Legs'],last=hist.filter(h=>['Push','Pull','Legs','Upper','Lower'].includes(h.type)); if(!last.length)return 'Push'; return rot[(rot.indexOf(last[0].type)+1)%rot.length]||'Push'; };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const elapsedSec = startedAt => Math.floor((Date.now()-startedAt)/1000);

// ══════════════════════════════════════════════════════
//  STATE — clean default, no fake history
// ══════════════════════════════════════════════════════
const DEFAULTS = {
  streak:0, energy:'normal', weight:0, weightGoal:0,
  weightHistory:[], measurements:{armL:0,armR:0,calfL:0,calfR:0,chest:0,waist:0},
  habits:[
    {id:'gym',  label:'Training',  done:false},
    {id:'eat',  label:'Nutrition', done:false},
    {id:'sleep',label:'Sleep',     done:false},
    {id:'supp', label:'Suplemen',  done:false},
  ],
  sleep:{bed:'23:00',wake:'07:00',duration:8},
  restDur:90, restAuto:true, customExercises:[],
  prs:[], history:[],
  templates:{
    push:{name:'Push Day',exercises:[
      {name:'Bench Press',lastSets:[{w:0,r:8},{w:0,r:8}]},
      {name:'Overhead Press',lastSets:[{w:0,r:8}]},
      {name:'Lateral Raise',lastSets:[{w:0,r:12}]},
    ]},
    pull:{name:'Pull Day',exercises:[
      {name:'Deadlift',lastSets:[{w:0,r:5}]},
      {name:'Pull-ups',lastSets:[{w:0,r:8}]},
      {name:'Barbell Row',lastSets:[{w:0,r:8}]},
    ]},
    legs:{name:'Legs',exercises:[
      {name:'Back Squat',lastSets:[{w:0,r:8}]},
      {name:'Romanian Deadlift',lastSets:[{w:0,r:8}]},
      {name:'Leg Press',lastSets:[{w:0,r:10}]},
    ]},
    upper:{name:'Upper Body',exercises:[]},
    lower:{name:'Lower Body',exercises:[]},
  },
};

let ST = (() => {
  try { const s=localStorage.getItem(SAVE_KEY); return s?{...DEFAULTS,...JSON.parse(s)}:{...DEFAULTS}; }
  catch(e){ return {...DEFAULTS}; }
})();
const save = () => { try{ localStorage.setItem(SAVE_KEY,JSON.stringify(ST)); }catch(e){} };
const persist = fn => { fn(); save(); render(); };

let CLOUD = (() => { try{ const s=localStorage.getItem(CLOUD_KEY); return s?JSON.parse(s):{binId:'',apiKey:''}; }catch(e){ return {binId:'',apiKey:''}; } })();
const saveCloud = () => { try{ localStorage.setItem(CLOUD_KEY,JSON.stringify(CLOUD)); }catch(e){} };

// ══════════════════════════════════════════════════════
//  SESSION PERSISTENCE — survives lock/close
//  Key fix: all timers use timestamps, not counters
// ══════════════════════════════════════════════════════
const SESSION_KEY = 'ft_active';
let SESSION = null;   // active workout, persisted to localStorage
let SUMMARY = null;

const saveSession = () => {
  if(SESSION) { try{ localStorage.setItem(SESSION_KEY,JSON.stringify(SESSION)); }catch(e){} }
  else { try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }
};
const loadSession = () => {
  try { const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; }
  catch(e){ return null; }
};

// Rest timer: persisted as {startedAt, total} — remaining calculated from timestamp
let _restIV = null;
const saveRest = r => { try{ if(r) localStorage.setItem(REST_KEY,JSON.stringify(r)); else localStorage.removeItem(REST_KEY); }catch(e){} };
const loadRest = () => { try{ const s=localStorage.getItem(REST_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } };
let _activeRest = loadRest(); // {startedAt, total}

function restRemaining() {
  if(!_activeRest) return 0;
  const elapsed = Math.floor((Date.now()-_activeRest.startedAt)/1000);
  return Math.max(0, _activeRest.total - elapsed);
}

// Elapsed timer: always computed from SESSION.startedAt, no counter
let _elapsedIV = null;
function startElapsedTick() {
  if(_elapsedIV) clearInterval(_elapsedIV);
  _elapsedIV = setInterval(()=>{
    if(!SESSION) { clearInterval(_elapsedIV); return; }
    const el=document.getElementById('elapsed-timer');
    if(el) el.textContent = fmtDur(elapsedSec(SESSION.startedAt));
  },1000);
}
function startRestTick() {
  if(_restIV) clearInterval(_restIV);
  _restIV = setInterval(()=>{
    const rem = restRemaining();
    const pill=document.getElementById('rest-pill');
    if(!pill||!_activeRest){ clearInterval(_restIV); return; }
    const t=pill.querySelector('.rt');
    const b=pill.querySelector('.rb');
    if(t) t.textContent = fmtDur(rem);
    if(b) b.style.width=`${(1-rem/_activeRest.total)*100}%`;
    if(rem<=0){ _activeRest=null; saveRest(null); clearInterval(_restIV); pill.remove(); }
  },1000);
}

// On visibility change (app re-open from lock): re-render so elapsed timer shows correct value
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && SESSION) render(); });

// ══════════════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════════════
let SCREEN = 'home';
let WFLOW  = null;   // null|picker|options|strength|run|wod|summary
let MODAL  = null;
let MODAL_DATA = {};

// ══════════════════════════════════════════════════════
//  SVG ICONS
// ══════════════════════════════════════════════════════
const svg = (d,s=18,c='currentColor',sw=2) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${d.split(' M ').map((p,i)=>`<path d="${i?'M '+p:p}"/>`).join('')}</svg>`;
const svgHome  = (c='currentColor',s=20) => svg('M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10',s,c);
const svgChart = (c='currentColor',s=20) => svg('M18 20V10 M12 20V4 M6 20v-6',s,c);
const svgUser  = (c='currentColor',s=20) => svg('M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',s,c);
const svgCal   = (c='currentColor',s=20) => svg('M8 2v4 M16 2v4 M3 8h18 M21 6H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z',s,c);
const svgPlus  = (c='currentColor',s=18) => svg('M12 5v14 M5 12h14',s,c);
const svgX     = (s=18,c='currentColor') => svg('M18 6 6 18 M6 6l12 12',s,c);
const svgCheck = (c='currentColor',s=16) => svg('M20 6 9 17l-5-5',s,c,3);
const svgChevR = (c='var(--faint)',s=16) => svg('M9 18l6-6-6-6',s,c);
const svgChevL = (c='var(--dim)',s=22)   => svg('M15 18l-6-6 6-6',s,c);
const svgFlame = (c='currentColor',s=14) => svg('M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z',s,c);
const svgTimer = (c='var(--blue)',s=17)  => svg('M10 2h4 M12 14l4-4 M12 22a8 8 0 1 0 0-16 8 8 0 0 0 0 16z',s,c);
const svgScale = (c='currentColor',s=18) => svg('M12 20h9 M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z',s,c);
const svgMoon  = (c='currentColor',s=18) => svg('M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z',s,c);
const svgCloud = (c='currentColor',s=15) => svg('M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z',s,c);
const svgDown  = (c='currentColor',s=18) => svg('M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3',s,c);
const svgUp    = (c='currentColor',s=18) => svg('M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12',s,c);
const svgSync  = (c='currentColor',s=18) => svg('M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15',s,c);
const svgTrophy= (c='currentColor',s=14) => svg('M6 9H4.5a2.5 2.5 0 0 1 0-5H6 M18 9h1.5a2.5 2.5 0 0 0 0-5H18 M4 22h16 M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22 M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22 M18 2H6v7a6 6 0 0 0 12 0V2z',s,c);
const svgMore  = (c='currentColor',s=17) => svg('M12 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2z M19 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2z M5 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2z',s,c);
const svgStar  = (c='currentColor',s=12) => svg('M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',s,c);
const svgKey   = (c='currentColor',s=14) => svg('M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4',s,c);
const svgNav   = (c='currentColor',s=18) => svg('M3 11l19-9-9 19-2-8-8-2z',s,c);
const svgStop2 = (c='currentColor',s=18) => svg('M8 3H5a2 2 0 0 0-2 2v3 M21 8V5a2 2 0 0 0-2-2h-3 M3 16v3a2 2 0 0 0 2 2h3 M16 21h3a2 2 0 0 0 2-2v-3',s,c);
const svgNote  = (c='currentColor',s=18) => svg('M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z',s,c);
const svgArrowU= (c='currentColor',s=12) => svg('M12 19V5 M5 12l7-7 7 7',s,c);
const svgArrowD= (c='currentColor',s=12) => svg('M12 5v14 M19 12l-7 7-7-7',s,c);
const svgTarget= (c='currentColor',s=18) => svg('M22 12h-4 M6 12H2 M12 6V2 M12 22v-4 M20 12a8 8 0 1 1-8-8',s,c);

function ringHTML(p,size,stroke,color,inner){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-Math.min(1,Math.max(0,p)));
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0;"><svg width="${size}" height="${size}" style="transform:rotate(-90deg);display:block;"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--bgHi)" stroke-width="${stroke}" fill="none"/><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">${inner}</div></div>`;
}
function lineChart(data,w,h){
  if(!data||data.length<2)return '';
  const vals=data.map(d=>d.v),mn=Math.min(...vals)-.5,mx=Math.max(...vals)+.5;
  const px=i=>(i/(data.length-1))*w, py=v=>h-((v-mn)/(mx-mn))*h;
  const pts=data.map((d,i)=>`${px(i).toFixed(1)},${py(d.v).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--blue)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--blue)" stop-opacity="0"/></linearGradient></defs><polygon points="${pts} ${w},${h} 0,${h}" fill="url(#lg)"/><polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
const sw = document.getElementById('sw');
const navEl = document.getElementById('nav');

function render(){
  // NAV
  if(WFLOW){ navEl.style.display='none'; }
  else{
    navEl.style.display='grid';
    const tabs=[{k:'home',icon:svgHome(),l:'Home'},{k:'progress',icon:svgChart(),l:'Progress'},{k:'body',icon:svgUser(),l:'Body'},{k:'history',icon:svgCal(),l:'History'}];
    navEl.innerHTML=tabs.map(t=>`<button class="nav-btn${SCREEN===t.k?' active':''}" onclick="go('${t.k}')"><div class="nav-dot"></div>${t.icon}<span>${t.l}</span></button>`).join('');
  }
  // SCREEN
  let html='';
  if(WFLOW==='picker')  html=renderPicker();
  else if(WFLOW==='options')  html=renderOptions();
  else if(WFLOW==='strength') html=renderStrength();
  else if(WFLOW==='run')      html=renderRun();
  else if(WFLOW==='wod')      html=renderWOD();
  else if(WFLOW==='summary')  html=renderSummary();
  else if(SCREEN==='home')     html=renderHome();
  else if(SCREEN==='progress') html=renderProgress();
  else if(SCREEN==='body')     html=renderBody();
  else if(SCREEN==='history')  html=renderHistory();
  sw.innerHTML=`<div class="page su" style="padding-bottom:${WFLOW?'120px':'100px'}">${html}</div>`;
  // MODAL
  const ov=document.getElementById('moverlay'); if(ov)ov.remove();
  if(MODAL){
    const mo=document.createElement('div'); mo.id='moverlay'; mo.className='sheet-overlay';
    mo.innerHTML=`<div class="sheet"><div class="drag"></div>${renderModal(MODAL)}</div>`;
    mo.addEventListener('click',e=>{if(e.target===mo)closeModal();});
    document.getElementById('app').appendChild(mo);
  }
  // REST PILL
  const oldPill=document.getElementById('rest-pill'); if(oldPill)oldPill.remove();
  const rem=restRemaining();
  if(_activeRest&&rem>0) spawnRestPill(rem);
  // Start ticks if in session
  if(SESSION&&WFLOW==='strength') startElapsedTick();
  if(_activeRest&&rem>0) startRestTick();
  // Attach strength inputs
  if(WFLOW==='strength') attachStrListeners();
}

function go(s){ SCREEN=s; WFLOW=null; render(); }
function closeModal(){ MODAL=null; MODAL_DATA={}; render(); }
function openModal(k,d={}){ MODAL=k; MODAL_DATA=d; render(); }

function renderOptions(){
  const t=SESSION.type, tk=t.toLowerCase();

  if(lastOfType) opts.push({title:'Repeat Last Workout',sub:new Date(lastOfType.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),icon:'sync',items:lastOfType.items.map(it=>it.kind==='strength'?{...it,sets:[]}:it)});

        <div style="flex:1;"><div style="font-size:15px;font-weight:700;">${o.title}</div><div style="font-size:11px;color:var(--dim);margin-top:2px;">${o.sub}</div></div>
        ${svgChevR()}
      </button>`).join('')}

}

function beginSession(idx){
  const t=SESSION.type, tk=t.toLowerCase();
  const tmpl=ST.templates[tk];
  const lastOfType=ST.history.find(h=>h.type===t&&h.items.length>0);
  const opts=[];
  if(tmpl) opts.push({items:tmpl.exercises.map(e=>({kind:'strength',name:e.name,lastSets:e.lastSets||[],sets:[]}))});
  if(lastOfType) opts.push({items:lastOfType.items.map(it=>it.kind==='strength'?{...it,sets:[]}:it)});
  opts.push({items:[]});
  SESSION={id:Date.now(),date:today(),type:t,startedAt:Date.now(),energy:ST.energy,items:opts[idx]?.items||[]};
  saveSession();
  if(t==='Running') WFLOW='run';
  else if(t==='Crossfit') WFLOW='wod';
  else WFLOW='strength';
  render();
}

function resumeSession(){
  if(!SESSION) return;
  if(SESSION.type==='Running') WFLOW='run';
  else if(SESSION.type==='Crossfit') WFLOW='wod';
  else WFLOW='strength';
  render();
}

    return `<div class="card" style="margin-bottom:11px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;">
        <div><div class="display" style="font-size:15px;font-weight:700;">${esc(ex.name)}</div>${lastStr?`<div style="font-size:10px;color:var(--faint);margin-top:1px;">${lastStr}</div>`:''}</div>

  return `
    <div style="position:sticky;top:-16px;z-index:10;background:rgba(15,23,42,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 18px;margin:-16px -18px 14px;">

function attachStrListeners(){
  document.querySelectorAll('.set-w').forEach(inp=>{
    inp.addEventListener('blur',e=>{
      const ei=+e.target.dataset.ei,si=+e.target.dataset.si;
      const v=parseFloat(e.target.value); if(!isNaN(v)){SESSION.items[ei].sets[si].w=v; saveSession();}
    });
  });
  document.querySelectorAll('.set-r').forEach(inp=>{
    inp.addEventListener('blur',e=>{
      const ei=+e.target.dataset.ei,si=+e.target.dataset.si;
      const v=parseInt(e.target.value); if(!isNaN(v)){SESSION.items[ei].sets[si].r=v; saveSession();}
    });
  });
  document.querySelectorAll('.set-done').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const b=e.currentTarget,ei=+b.dataset.ei,si=+b.dataset.si;
      const wEl=document.querySelector(`.set-w[data-ei="${ei}"][data-si="${si}"]`);
      const rEl=document.querySelector(`.set-r[data-ei="${ei}"][data-si="${si}"]`);
      if(wEl){const v=parseFloat(wEl.value);if(!isNaN(v))SESSION.items[ei].sets[si].w=v;}
      if(rEl){const v=parseInt(rEl.value);if(!isNaN(v))SESSION.items[ei].sets[si].r=v;}
      const was=SESSION.items[ei].sets[si].done;
      SESSION.items[ei].sets[si].done=!was;
      saveSession();
      if(!was&&ST.restAuto) doStartRest(ST.restDur);
      render();
    });
  });
  document.querySelectorAll('.set-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const b=e.currentTarget,ei=+b.dataset.ei,si=+b.dataset.si;
      SESSION.items[ei].sets.splice(si,1); saveSession(); render();
    });
  });
}

function addSet(ei){
  const ex=SESSION.items[ei];
  const last=ex.sets[ex.sets.length-1]||ex.lastSets?.[ex.lastSets.length-1]||{w:0,r:0};
  ex.sets.push({w:last.w||0,r:last.r||0,done:false});
  saveSession(); render();
}
function removeEx(ei){ SESSION.items.splice(ei,1); saveSession(); render(); }

function finishStrength(){
  if(_elapsedIV) clearInterval(_elapsedIV);
  SESSION.dur=Math.floor(elapsedSec(SESSION.startedAt)/60);
  SESSION.finishedAt=Date.now();
  SUMMARY={...SESSION};
  checkPRs(SUMMARY);
  persist(()=>{
    ST.history.unshift({...SUMMARY});
    ST.habits=ST.habits.map(h=>h.id==='gym'?{...h,done:true}:h);
    if(!ST.habits.find(h=>h.id==='gym')?.done) ST.streak++;
  });
  doStopRest();
  SESSION=null; saveSession();
  WFLOW='summary'; render();
}

function cancelWorkout(){
  if(_elapsedIV) clearInterval(_elapsedIV);
  doStopRest();
  SESSION=null; saveSession();
  WFLOW=null; render();
}

// Auto PR detection
function checkPRs(session){
  session.items.filter(it=>it.kind==='strength').forEach(ex=>{
    const bestSet=ex.sets.filter(s=>s.done).reduce((best,s)=>{
      if(!best||(s.w||0)>(best.w||0)) return s; return best;
    },null);
    if(!bestSet||!(bestSet.w>0)) return;
    const existing=ST.prs.find(p=>p.lift===ex.name);
    if(!existing||(bestSet.w||0)>(existing.weight||0)){
      if(existing) ST.prs=ST.prs.filter(p=>p.lift!==ex.name);
      ST.prs.unshift({lift:ex.name,weight:bestSet.w,reps:bestSet.r,date:today()});
    }
  });
  session.items.filter(it=>it.kind==='run').forEach(r=>{
    const existing=ST.prs.find(p=>p.lift==='Best Run');
    if(!existing||r.distance>existing.distance){
      if(existing) ST.prs=ST.prs.filter(p=>p.lift!=='Best Run');
      ST.prs.unshift({lift:'Best Run',weight:null,reps:null,distance:r.distance,pace:r.pace,time:r.time,date:today()});
    }
  });
}

function updatePaceDisp(){
  const km=parseFloat(SESSION._dist)||0,min=parseFloat(SESSION._time)||0;
  const p=calcPace(km,min),el=document.getElementById('pace-disp');
  if(el){el.textContent=p;el.style.color=p==='--:--'?'var(--faint)':'var(--text)';}
}
function setRunMode(m){SESSION._mode=m;render();}
function haversine(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function toggleGPS(){
  if(_gpsActive){
    if(_gpsWatch)navigator.geolocation.clearWatch(_gpsWatch);
    if(_gpsIV)clearInterval(_gpsIV);
    _gpsActive=false;render();
  } else {
    if(!navigator.geolocation){const e=document.getElementById('gps-err');if(e){e.style.display='block';e.textContent='GPS not available';}return;}
    _gpsActive=true;_gpsDist=0;_gpsTime=0;_gpsLastPos=null;
    _gpsIV=setInterval(()=>{_gpsTime++;render();},1000);
    _gpsWatch=navigator.geolocation.watchPosition(pos=>{
      const cur={lat:pos.coords.latitude,lon:pos.coords.longitude};
      if(_gpsLastPos){const d=haversine(_gpsLastPos,cur);if(d>0.002)_gpsDist+=d;}
      _gpsLastPos=cur;render();
    },err=>{const e=document.getElementById('gps-err');if(e){e.style.display='block';e.textContent='GPS error: '+err.message;}_gpsActive=false;render();},{enableHighAccuracy:true,maximumAge:2000});
  }
}
function saveRun(){
  const mode=SESSION._mode||'manual';
  const km=mode==='gps'?+_gpsDist.toFixed(2):parseFloat(SESSION._dist)||0;
  const min=mode==='gps'?+(_gpsTime/60).toFixed(1):parseFloat(SESSION._time)||0;
  if(!km||!min)return;
  if(_gpsWatch)navigator.geolocation.clearWatch(_gpsWatch);
  if(_gpsIV)clearInterval(_gpsIV);
  SESSION.dur=Math.round(min);
  SESSION.items=[{kind:'run',distance:km,time:min,pace:calcPace(km,min),feeling:SESSION._feeling||'normal'}];
  SESSION.finishedAt=Date.now();
  SUMMARY={...SESSION};
  checkPRs(SUMMARY);
  persist(()=>{ST.history.unshift({...SUMMARY});ST.habits=ST.habits.map(h=>h.id==='gym'?{...h,done:true}:h);});
  SESSION=null;saveSession();WFLOW='summary';render();
}

function doneSummary(){
  const noteEl=document.getElementById('sess-note');
  if(noteEl&&noteEl.value.trim()&&ST.history.length>0){

  WFLOW=null;SESSION=null;SUMMARY=null;SCREEN='home';render();
}

// ══════════════════════════════════════════════════════
//  REST TIMER (timestamp-based — works when app is locked)
// ══════════════════════════════════════════════════════
function doStartRest(dur){
  if(_restIV)clearInterval(_restIV);
  _activeRest={startedAt:Date.now(),total:dur};
  saveRest(_activeRest);
  spawnRestPill(dur);
  startRestTick();
}
function doStopRest(){
  if(_restIV)clearInterval(_restIV);
  _activeRest=null;saveRest(null);
  const p=document.getElementById('rest-pill');if(p)p.remove();
}

function spawnRestPill(rem){
  let pill=document.getElementById('rest-pill');
  if(!pill){
    pill=document.createElement('div');pill.id='rest-pill';
    pill.style.cssText='position:fixed;bottom:90px;left:0;right:0;max-width:440px;margin:0 auto;padding:0 13px;z-index:50;pointer-events:none;';
    document.getElementById('app').appendChild(pill);
  }
  const total=_activeRest?._activeRest?.total||_activeRest?.total||90;
  pill.innerHTML=`<div style="background:var(--bgCard);border:1px solid var(--blue);border-radius:14px;padding:8px 12px;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px var(--blueGlow);animation:slideUp .22s;pointer-events:auto;">
    ${svgTimer()}
    <div style="flex:1;"><div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:10px;color:var(--dim);font-weight:600;">Rest</span><span class="mono rt" style="font-size:16px;font-weight:700;">${fmtDur(rem)}</span></div><div style="height:2px;background:var(--bgHi);border-radius:1px;overflow:hidden;"><div class="rb" style="height:100%;background:var(--blue);width:0%;transition:width 1s linear;border-radius:1px;"></div></div></div>
    <button onclick="doStopRest()" style="padding:3px 7px;background:var(--bgHi);border-radius:7px;font-size:11px;font-weight:700;color:var(--dim);">Done</button>
    <button onclick="doStopRest()" style="pointer-events:auto;">${svgX(14)}</button>
  </div>`;
}

function renderHistory(){

          <div style="display:flex;justify-content:space-between;margin-bottom:3px;"><div style="display:flex;align-items:center;gap:5px;"><span style="font-size:13px;font-weight:800;color:${ti.color};">${TYPE_INFO[h.type]?.icon||ti.icon}</span><span class="display" style="font-size:14px;font-weight:700;">${h.type}</span>${h.energy?`<span class="badge" style="background:${ti.color.replace(')',',0.12)')};border:1px solid ${ti.color.replace(')',',0.25)')};color:${ti.color};font-size:9px;">${h.energy}</span>`:''}</div><span style="font-size:10px;color:var(--faint);font-weight:600;">${h.dur?h.dur+'m':''}</span></div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:${exercises.length>0?4:0}px;">${exercises.length>0?`${exercises.length} exercises &middot; ${setsOf(h.items)} sets${tv>0?` &middot; ${tv>=1000?(tv/1000).toFixed(1)+'t':tv+'kg'}`:''}`:''} ${runs.map(r=>`${r.distance}km @ ${r.pace}/km`).join('')} ${wods.map(w=>`${w.type} ${w.rounds}+${w.extraReps}`).join('')}${h.items.length===0?'No details logged':''}</div>

}

function renderModal(k){
  let inner='';

  if(k==='habits')  inner=mHabits();
  if(k==='addex')   inner=mAddEx();

  if(k==='backup')  inner=mBackup();
  if(k==='restset') inner=mRestSet();
  if(k==='histdet') inner=mHistDet(MODAL_DATA.idx);
  return inner;
}

function mWeight(){

      ${ST.weightGoal>0?`<div style="font-size:12px;color:var(--dim);margin-bottom:12px;">Goal: <span class="mono" style="font-weight:700;color:var(--green);">${ST.weightGoal}kg</span></div>`:''}

    <button onclick="saveWeight()" class="btn-p">Save Weight</button>`;

function adjustW(d){const inp=document.getElementById('w-val');if(inp)inp.value=+(parseFloat(inp.value||0)+d).toFixed(1);}
function saveWeight(){
  const v=parseFloat(document.getElementById('w-val')?.value)||0;
  const goal=parseFloat(document.getElementById('w-goal')?.value)||ST.weightGoal;
  persist(()=>{
    ST.weight=v;ST.weightGoal=goal;
    ST.weightHistory=[...ST.weightHistory.filter(w=>w.date!==today()),{date:today(),v}];
  });
  closeModal();
}

function mSleep(){
  return `
    <div class="display" style="font-size:20px;font-weight:700;margin-bottom:14px;">Log Sleep</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;">
      ${[{l:'Bedtime',id:'s-bed',v:ST.sleep.bed},{l:'Wake Up',id:'s-wake',v:ST.sleep.wake}].map(f=>`<div class="card-hi" style="border:1px solid var(--border);border-radius:12px;"><div class="label" style="margin-bottom:3px;">${f.l}</div><input id="${f.id}" type="time" value="${f.v}" oninput="updSleepDur();" style="font-size:20px;font-weight:700;"/></div>`).join('')}

      <div id="sleep-msg" style="font-size:11px;color:var(--dim);margin-top:2px;">${ST.sleep.duration>=7?'Good recovery':'Need more sleep'}</div>

function updSleepDur(){
  const bed=document.getElementById('s-bed')?.value,wake=document.getElementById('s-wake')?.value,dur=calcSleep(bed,wake);
  const el=document.getElementById('sleep-dur');if(el)el.textContent=dur.toFixed(1)+'h';

function saveSleep(){
  const bed=document.getElementById('s-bed')?.value||ST.sleep.bed;

  persist(()=>{ST.sleep={bed,wake,duration:calcSleep(bed,wake)};});closeModal();

function editHabit(id,val){ST.habits=ST.habits.map(h=>h.id===id?{...h,label:val}:h);save();}
function removeHabit(id){
  persist(()=>{ST.habits=ST.habits.filter(h=>h.id!==id);});
  const mo=document.getElementById('moverlay');if(mo)mo.innerHTML=`<div class="sheet"><div class="drag"></div>${mHabits()}</div>`;

function addHabit(){
  const label=document.getElementById('new-habit')?.value?.trim();if(!label)return;
  persist(()=>{ST.habits.push({id:Date.now().toString(),label,done:false});});
  const mo=document.getElementById('moverlay');if(mo)mo.innerHTML=`<div class="sheet"><div class="drag"></div>${mHabits()}</div>`;
}

function mAddEx(){
  const q=MODAL_DATA.q||'';
  const all=[...new Set([...ST.customExercises,...EXERCISES])];
  const filtered=q?all.filter(e=>e.toLowerCase().includes(q.toLowerCase())):all;
  const showCustom=q&&!all.some(e=>e.toLowerCase()===q.toLowerCase());
  return `
    <div class="display" style="font-size:20px;font-weight:700;margin-bottom:11px;">Add Exercise</div>
    <div style="background:var(--bgCard);border:1px solid var(--border);border-radius:11px;padding:9px 12px;margin-bottom:9px;display:flex;align-items:center;gap:7px;">
      <input type="text" placeholder="Search or type custom..." value="${esc(q)}" oninput="MODAL_DATA.q=this.value;updExList();" style="flex:1;font-size:13px;" autofocus/>
      ${q?`<button onclick="MODAL_DATA.q='';updExList();">${svgX(14)}</button>`:''}
    </div>
    <div style="overflow-y:auto;max-height:48vh;">
      ${showCustom?`<button onclick="addExercise('${esc(q).replace(/'/g,"\\'")}');" style="width:100%;display:block;background:var(--blueDim);border:1px solid rgba(59,130,246,.4);border-radius:11px;padding:10px 12px;text-align:left;margin-bottom:7px;font-size:13px;font-weight:700;color:var(--blue);">${svgPlus('var(--blue)',15)} Add "${esc(q)}"</button>`:''}
      ${ST.customExercises.length>0&&!q?`<div class="label" style="padding:2px 2px 6px;">Your Exercises</div>${ST.customExercises.map(n=>`<button onclick="addExercise('${esc(n).replace(/'/g,"\\'")}');" style="width:100%;display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:9px;font-size:13px;font-weight:600;color:var(--blue);">${svgStar('var(--blue)')} ${esc(n)}</button>`).join('')}<div style="height:1px;background:var(--border);margin:5px 0;"></div>`:''}
      ${filtered.map(n=>`<button onclick="addExercise('${esc(n).replace(/'/g,"\\'")}');" style="width:100%;display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:9px;font-size:13px;font-weight:500;">${svgMore('var(--faint)')} ${esc(n)}</button>`).join('')}
    </div>`;
}
function updExList(){const mo=document.getElementById('moverlay');if(mo)mo.innerHTML=`<div class="sheet"><div class="drag"></div>${mAddEx()}</div>`;}
function addExercise(name){
  SESSION.items.push({kind:'strength',name,sets:[]});
  if(!ST.customExercises.includes(name)&&!EXERCISES.includes(name)) persist(()=>{ST.customExercises.push(name);});
  saveSession();closeModal();render();
}

function mEnergy(){
  const opts=[{k:'low',l:'Low Energy',s:'Tired, rough night',c:'var(--dim)'},{k:'normal',l:'Normal',s:'Ready to train',c:'var(--blue)'},{k:'high',l:'High Energy',s:"Let's go",c:'var(--green)'}];
  return `
    <div class="display" style="font-size:20px;font-weight:700;margin-bottom:13px;">Energy Level</div>
    ${opts.map(o=>`<button onclick="saveEnergy('${o.k}')" style="width:100%;display:flex;align-items:center;gap:10px;background:${ST.energy===o.k?`${o.c}1A`:'var(--bgCard)'};border:1px solid ${ST.energy===o.k?o.c:'var(--border)'};border-radius:13px;padding:13px 14px;margin-bottom:8px;text-align:left;">
      <div style="width:38px;height:38px;border-radius:10px;background:${o.c}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:${o.c};">${o.k==='low'?'LOW':o.k==='normal'?'MED':'HIGH'}</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;color:${ST.energy===o.k?o.c:'var(--text)'};">${o.l}</div><div style="font-size:11px;color:var(--dim);margin-top:1px;">${o.s}</div></div>
      ${ST.energy===o.k?svgCheck(o.c,17):''}
    </button>`).join('')}`;
}
function saveEnergy(e){persist(()=>{ST.energy=e;});closeModal();}

function mRestSet(){
  return `
    <div class="display" style="font-size:20px;font-weight:700;margin-bottom:13px;">Rest Timer</div>
    <div class="label" style="margin-bottom:8px;">Duration</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;">
      ${[30,60,90,120].slice(0,3).map(s=>`<button onclick="ST.restDur=${s};save();document.querySelectorAll('.rd-btn').forEach(b=>b.style.background='var(--bgHi)');this.style.background='var(--blueDim)';" class="rd-btn" style="background:${ST.restDur===s?'var(--blueDim)':'var(--bgHi)'};border:1px solid ${ST.restDur===s?'var(--blue)':'var(--border)'};border-radius:11px;padding:12px 4px;text-align:center;font-weight:700;font-size:14px;color:${ST.restDur===s?'var(--blue)':'var(--dim)'};">${s}s</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:13px;">
      <div style="flex:1;background:var(--bgHi);border:1px solid var(--border);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:6px;">${svgTimer('var(--faint)',13)}<input id="rest-custom" type="number" inputmode="numeric" placeholder="Custom (sec)" value="" style="font-size:13px;flex:1;"/></div>
      <button onclick="const v=parseInt(document.getElementById('rest-custom').value);if(v>0){ST.restDur=v;save();closeModal();}" style="background:var(--bgHi);border:1px solid var(--border);padding:9px 12px;border-radius:10px;font-weight:700;font-size:12px;color:var(--dim);">Set</button>
    </div>
    <div style="font-size:12px;color:var(--dim);text-align:center;margin-bottom:13px;">Current: <span class="mono" style="font-weight:700;color:var(--text);">${ST.restDur}s</span></div>
    <button onclick="ST.restAuto=!ST.restAuto;save();const mo=document.getElementById('moverlay');if(mo)mo.innerHTML='<div class=\\'sheet\\'><div class=\\'drag\\'></div>'+mRestSet()+'</div>';" style="width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--bgCard);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:13px;">
      <div><div style="font-size:13px;font-weight:700;">Auto-start timer</div><div style="font-size:11px;color:var(--dim);margin-top:1px;">Starts after marking set done</div></div>
      <div style="width:42px;height:24px;border-radius:12px;background:${ST.restAuto?'var(--green)':'var(--bgHi)'};border:1px solid ${ST.restAuto?'var(--green)':'var(--borderHi)'};position:relative;"><div style="position:absolute;top:2.5px;left:${ST.restAuto?'18px':'2.5px'};width:19px;height:19px;border-radius:50%;background:#fff;"></div></div>
    </button>
    <button onclick="closeModal();" class="btn-p">Done</button>`;
}

function mBackup(){
  return `
    <div class="display" style="font-size:20px;font-weight:700;margin-bottom:4px;">Backup & Sync</div>
    <div style="font-size:12px;color:var(--faint);margin-bottom:14px;">Auto-saves to browser. Use backup to never lose data.</div>
    <div id="bk-status"></div>
    <div class="label" style="margin-bottom:9px;">Local File</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px;">
      <button onclick="doExport()" style="background:var(--bgCard);border:1px solid var(--border);border-radius:13px;padding:13px 8px;text-align:center;">${svgDown('var(--green)',19)}<div style="font-size:13px;font-weight:700;color:var(--green);margin-top:5px;">Export</div><div style="font-size:10px;color:var(--faint);margin-top:1px;">Save .json</div></button>
      <button onclick="doImport()" style="background:var(--bgCard);border:1px solid var(--border);border-radius:13px;padding:13px 8px;text-align:center;">${svgUp('var(--blue)',19)}<div style="font-size:13px;font-weight:700;color:var(--blue);margin-top:5px;">Import</div><div style="font-size:10px;color:var(--faint);margin-top:1px;">Load .json</div></button>
    </div>
    <div class="label" style="margin-bottom:4px;">Cloud (JSONBin.io — gratis)</div>
    <div style="font-size:11px;color:var(--faint);margin-bottom:9px;">Daftar di jsonbin.io &rarr; API Keys &rarr; copy Master Key</div>
    <div class="card-hi" style="border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:7px;"><div class="label" style="margin-bottom:4px;">Master Key</div><input type="password" placeholder="$2b$10$..." value="${esc(CLOUD.apiKey)}" oninput="CLOUD.apiKey=this.value;saveCloud();" style="font-size:12px;letter-spacing:1px;"/></div>
    <div class="card-hi" style="border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:11px;"><div class="label" style="margin-bottom:4px;">Bin ID <span style="font-weight:400;text-transform:none;color:var(--faint);">(otomatis dibuat saat pertama save)</span></div><input type="text" placeholder="Kosongkan untuk buat baru" value="${esc(CLOUD.binId)}" oninput="CLOUD.binId=this.value;saveCloud();" style="font-size:12px;"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button onclick="doCloudSave()" style="background:${CLOUD.apiKey?'var(--blueDim)':'var(--bgCard)'};border:1px solid ${CLOUD.apiKey?'var(--blue)':'var(--border)'};border-radius:13px;padding:13px 8px;text-align:center;opacity:${CLOUD.apiKey?1:.45};">${svgCloud('var(--blue)',19)}<div style="font-size:13px;font-weight:700;color:var(--blue);margin-top:5px;">Save Cloud</div></button>
      <button onclick="doCloudLoad()" style="background:${CLOUD.apiKey&&CLOUD.binId?'var(--greenDim)':'var(--bgCard)'};border:1px solid ${CLOUD.apiKey&&CLOUD.binId?'var(--green)':'var(--border)'};border-radius:13px;padding:13px 8px;text-align:center;opacity:${CLOUD.apiKey&&CLOUD.binId?1:.45};">${svgSync('var(--green)',19)}<div style="font-size:13px;font-weight:700;color:var(--green);margin-top:5px;">Load Cloud</div></button>
    </div>`;
}

function setBkStatus(type,msg){const el=document.getElementById('bk-status');if(!el)return;const icons={ok:svgCheck('var(--green)',13),err:svgX(13,'var(--red)'),loading:'<div class="spinner"></div>'};el.innerHTML=`<div class="status ${type}" style="margin-bottom:12px;">${icons[type]} ${msg}</div>`;if(type!=='loading')setTimeout(()=>{if(el)el.innerHTML='';},4000);}
function doExport(){const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`fittrack-${today()}.json`;a.click();URL.revokeObjectURL(url);setBkStatus('ok','Downloaded!');}
function doImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);ST={...ST,...d};save();render();closeModal();}catch(err){setBkStatus('err','Invalid file');}};r.readAsText(f);};inp.click();}
async function doCloudSave(){if(!CLOUD.apiKey){setBkStatus('err','Enter API key first');return;}setBkStatus('loading','Saving...');try{const h={'Content-Type':'application/json','X-Master-Key':CLOUD.apiKey,'X-Bin-Private':'true'};if(!CLOUD.binId){const res=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{...h,'X-Bin-Name':'FitTrack'},body:JSON.stringify(ST)});if(!res.ok)throw new Error('Error '+res.status);const d=await res.json();CLOUD.binId=d.metadata.id;saveCloud();}else{const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD.binId}`,{method:'PUT',headers:h,body:JSON.stringify(ST)});if(!res.ok)throw new Error('Error '+res.status);}setBkStatus('ok','Saved! Bin: '+CLOUD.binId.slice(0,10)+'...');}catch(e){setBkStatus('err',e.message);}}
async function doCloudLoad(){if(!CLOUD.apiKey||!CLOUD.binId){setBkStatus('err','Set API key + Bin ID');return;}setBkStatus('loading','Loading...');try{const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD.binId}/latest`,{headers:{'X-Master-Key':CLOUD.apiKey}});if(!res.ok)throw new Error('Error '+res.status);const d=await res.json();ST={...ST,...d.record};save();render();closeModal();}catch(e){setBkStatus('err',e.message);}}

function mHistDet(idx){
  const h=ST.history[idx];if(!h)return '<div>Not found</div>';
  const ti=TYPE_INFO[h.type]||TYPE_INFO.Push,d=new Date(h.date);
  const exercises=h.items.filter(i=>i.kind==='strength');
  const runs=h.items.filter(i=>i.kind==='run');
  const wods=h.items.filter(i=>i.kind==='wod');
  return `
    <div class="display" style="font-size:16px;font-weight:700;margin-bottom:11px;">${h.type} &middot; ${d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'})}</div>
    <div style="display:flex;gap:6px;margin-bottom:11px;">${h.dur?`<span class="badge" style="background:${ti.color.replace(')',',0.12)')};border:1px solid ${ti.color.replace(')',',0.25)')};color:${ti.color};">${h.dur}min</span>`:''} ${h.energy?`<span class="badge" style="background:${ti.color.replace(')',',0.12)')};border:1px solid ${ti.color.replace(')',',0.25)')};color:${ti.color};">${h.energy}</span>`:''}</div>
    <div style="max-height:60vh;overflow-y:auto;">
      ${exercises.map((ex,i)=>{
        const done=ex.sets?.filter(s=>s.done)||[],vol=done.reduce((a,s)=>a+(s.w||0)*(s.r||0),0);
        return `<div class="card" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;margin-bottom:7px;"><div style="font-size:13px;font-weight:700;">${esc(ex.name)}</div>${vol>0?`<span class="mono" style="font-size:11px;font-weight:700;color:${ti.color};">${vol}kg</span>`:''}</div>${(ex.sets||[]).map((s,si)=>`<div style="display:flex;gap:9px;padding:4px 0;border-top:1px solid var(--border);font-size:12px;color:${s.done?'var(--text)':'var(--dim)'}"><span class="mono" style="color:var(--faint);width:16px;text-align:center;">${si+1}</span><span class="mono;flex:1;">${s.w}kg x ${s.r}</span>${s.done?svgCheck('var(--green)',12):''}</div>`).join('')}</div>`;
      }).join('')}
      ${runs.map(r=>`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">${[{l:'Distance',v:`${r.distance}km`,c:'var(--green)'},{l:'Time',v:`${r.time}m`,c:'var(--blue)'},{l:'Pace',v:r.pace,c:'var(--yellow)'}].map(s=>`<div class="card" style="padding:10px 7px;text-align:center;"><div class="mono" style="font-size:16px;font-weight:700;color:${s.c};">${s.v}</div><div class="label" style="margin-top:3px;">${s.l}</div></div>`).join('')}</div>`).join('')}
      ${wods.map(w=>`<div class="card" style="margin-bottom:8px;"><div class="mono" style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:7px;">${w.type}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;">${[{l:'Rounds',v:w.rounds,c:'var(--red)'},{l:'Time',v:`${w.time}m`,c:'var(--blue)'},{l:'+Reps',v:w.extraReps,c:'var(--yellow)'}].map(s=>`<div style="text-align:center;"><div class="mono" style="font-size:19px;font-weight:700;color:${s.c};">${s.v}</div><div class="label" style="margin-top:2px;">${s.l}</div></div>`).join('')}</div></div>`).join('')}
      ${h.note?`<div style="background:var(--bgHi);border-radius:11px;padding:11px 12px;margin-top:8px;"><div class="label" style="margin-bottom:4px;">Notes</div><div style="font-size:13px;color:var(--dim);line-height:1.5;">${esc(h.note)}</div></div>`:''}
      ${h.items.length===0?`<div style="text-align:center;padding:20px 0;color:var(--faint);font-size:12px;">No detailed logs for this session.</div>`:''}
    </div>`;
}

// ══════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════
function startFlow(){ WFLOW='picker'; render(); }
function toggleHabit(id){ persist(()=>{ ST.habits=ST.habits.map(h=>h.id===id?{...h,done:!h.done}:h); }); }

// ══════════════════════════════════════════════════════
//  BOOT — restore any active session
// ══════════════════════════════════════════════════════
SESSION = loadSession();
// If session was active and screen was locked, show resume banner on home
if(SESSION){ SCREEN='home'; WFLOW=null; }

render();
</script>
</body>
</html>
