// SVG Area Chart
function AreaChart({data,color=C.blue,height=120}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.value);
  const mn=Math.min(...vals)-.5,mx=Math.max(...vals)+.5;
  const W=360,H=height;
  const x=i=>(i/(data.length-1))*W;
  const y=v=>H-((v-mn)/(mx-mn))*H;
  const pts=data.map((d,i)=>`${x(i)},${y(d.value)}`).join(" ");
  const area=`M${x(0)},${H} L${data.map((d,i)=>`${x(i)},${y(d.value)}`).join(" L")} L${x(data.length-1)},${H} Z`;
  return html`
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color=${color} stop-opacity="0.35"/>
          <stop offset="100%" stop-color=${color} stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d=${area} fill="url(#grad)"/>
      <polyline points=${pts} fill="none" stroke=${color} stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx=${x(data.length-1)} cy=${y(vals[vals.length-1])} r="4" fill=${color}/>
    </svg>`;
}

  useEffect(()=>{
    if(!rest||rest.rem<=0)return;
    const t=setTimeout(()=>setRest(r=>r?{...r,rem:r.rem-1}:null),1000);
    return()=>clearTimeout(t);
  },[rest]);

  const startRest=useCallback(dur=>setRest({total:dur,rem:dur}),[]);

  const finishW=useCallback(final=>{
    setRest(null);
    setSt(s=>({...s,history:[final,...s.history.filter(h=>h.id!==final.id)],
      habits:s.habits.map(h=>h.id==="gym"?{...h,done:true}:h),
      streak:s.habits.find(h=>h.id==="gym")?.done?s.streak:s.streak+1}));
    setSummary(final);setWorkout(null);setWscr("summary");
  },[setSt]);

  const cancelW=()=>{setRest(null);setWorkout(null);setWscr(null);};

  const inW=!!wscr&&wscr!=="summary";

  return html`
    <div class="app">
      <div style=${{position:"fixed",top:0,left:0,right:0,maxWidth:440,margin:"0 auto",height:260,
        background:`radial-gradient(ellipse at top,${C.blueGlow} 0%,transparent 70%)`,
        pointerEvents:"none",zIndex:0}}></div>

      <div style=${{position:"relative",zIndex:1,flex:1,display:"flex",flexDirection:"column",overflow:"hidden",height:"100%"}}>
        ${!wscr&&screen==="home"    &&html`<${HomeScreen}    st=${st} setSt=${setSt} onStart=${()=>setWscr("picker")} setModal=${setModal}/>`}
        ${!wscr&&screen==="progress"&&html`<${ProgressScreen} st=${st}/>`}
        ${!wscr&&screen==="body"    &&html`<${BodyScreen}    st=${st} setSt=${setSt} setModal=${setModal}/>`}
        ${!wscr&&screen==="history" &&html`<${HistoryScreen}  st=${st} setModal=${setModal}/>`}

        ${wscr==="picker" &&html`<${WorkoutPicker} onBack=${()=>setWscr(null)} onPick=${t=>{setWorkout({type:t});setWscr("options");}}/>`}
        ${wscr==="options"&&workout&&html`<${StartOptions} type=${workout.type} st=${st}
          onBack=${()=>{setWscr("picker");setWorkout(null);}}
          onBegin=${items=>{const s={id:Date.now(),date:ago(0),type:workout.type,startedAt:Date.now(),energy:"normal",items};setWorkout(s);setWscr(workout.type==="Running"?"run":workout.type==="Crossfit"?"wod":"strength");}}/>`}
        ${wscr==="strength"&&workout&&html`<${StrengthScreen} session=${workout} setSession=${setWorkout}
          onFinish=${finishW} onCancel=${cancelW} rest=${rest} startRest=${startRest}
          restSettings=${st.restSettings} customEx=${st.customExercises}
          addCustomEx=${n=>setSt(s=>({...s,customExercises:[...new Set([...s.customExercises,n])]}))}
        />`}
        ${wscr==="run"&&workout&&html`<${RunScreen} session=${workout} setSession=${setWorkout} onFinish=${finishW} onCancel=${cancelW}/>`}
        ${wscr==="wod"&&workout&&html`<${WODScreen} session=${workout} setSession=${setWorkout} onFinish=${finishW} onCancel=${cancelW}/>`}
        ${wscr==="summary"&&html`<${SummaryScreen} data=${summary} onDone=${()=>{setWscr(null);setScreen("home");}}/>`}
      </div>

      ${rest&&rest.rem>0&&html`<${RestPill} timer=${rest} onClose=${()=>setRest(null)} onSkip=${()=>setRest(r=>r?{...r,rem:0}:null)}/>`}
      ${!wscr&&html`<${FAB} open=${fab} setOpen=${setFab} onStart=${()=>{setFab(false);setWscr("picker");}} onWeight=${()=>{setFab(false);setModal({type:"weight"});}} onRun=${()=>{setFab(false);setWorkout({type:"Running"});setWscr("run");}}/>`}
      ${!wscr&&html`<${BottomNav} cur=${screen} onChange=${s=>{setScreen(s);setFab(false);}}/>`}

      ${modal?.type==="weight"  &&html`<${WeightModal}  value=${st.weight} goal=${st.weightGoal} onClose=${()=>setModal(null)} onSave=${v=>{setSt(s=>({...s,weight:v,weightHistory:[...s.weightHistory.filter(w=>w.date!==ago(0)),{date:ago(0),value:v}]}));setModal(null);}}/>`}
      ${modal?.type==="sleep"   &&html`<${SleepModal}   sleep=${st.sleep}  onClose=${()=>setModal(null)} onSave=${sl=>{setSt(s=>({...s,sleep:sl}));setModal(null);}}/>`}
      ${modal?.type==="measure" &&html`<${MeasureModal} m=${st.measurements} onClose=${()=>setModal(null)} onSave=${m=>{setSt(s=>({...s,measurements:m}));setModal(null);}}/>`}
      ${modal?.type==="habits"  &&html`<${HabitsModal}  habits=${st.habits} onClose=${()=>setModal(null)} onSave=${h=>{setSt(s=>({...s,habits:h}));setModal(null);}}/>`}
      ${modal?.type==="restset" &&html`<${RestSettingsModal} settings=${st.restSettings} onClose=${()=>setModal(null)} onSave=${rs=>{setSt(s=>({...s,restSettings:rs}));setModal(null);}}/>`}
      ${modal?.type==="histdet" &&html`<${HistDetailModal} session=${modal.session} onClose=${()=>setModal(null)}/>`}
      ${modal?.type==="energy"  &&html`<${EnergyModal}  current=${st.energy} onClose=${()=>setModal(null)} onSave=${e=>{setSt(s=>({...s,energy:e}));setModal(null);}}/>`}
      ${modal?.type==="backup"  &&html`<${BackupModal}  st=${st} onClose=${()=>setModal(null)} onImport=${d=>{setSt(s=>({...s,...d}));setModal(null);}}/>`}
    </div>`;
}

  const addSet=idx=>setSession(s=>{const items=[...s.items],ex=items[idx],last=ex.sets[ex.sets.length-1]||ex.lastSets?.[ex.lastSets.length-1]||{w:0,r:0};items[idx]={...ex,sets:[...ex.sets,{w:last.w||0,r:last.r||0,done:false}]};return{...s,items};});
  const updSet=(ei,si,f,v)=>setSession(s=>{const items=[...s.items],ex={...items[ei],sets:[...items[ei].sets]};ex.sets[si]={...ex.sets[si],[f]:v};items[ei]=ex;return{...s,items};});
  const togDone=(ei,si)=>setSession(s=>{const items=[...s.items],ex={...items[ei],sets:[...items[ei].sets]},was=ex.sets[si].done;ex.sets[si]={...ex.sets[si],done:!was};items[ei]=ex;if(!was&&restSettings.autoStart)startRest(restSettings.duration);return{...s,items};});
  const rmSet=(ei,si)=>setSession(s=>{const items=[...s.items];items[ei]={...items[ei],sets:items[ei].sets.filter((_,i)=>i!==si)};return{...s,items};});
  const rmEx=idx=>setSession(s=>({...s,items:s.items.filter((_,i)=>i!==idx)}));

      </div>
      <div style=${{display:"flex",gap:20,justifyContent:"center"}}>
        ${[{v:ts,l:"Sets"},{v:`${(tv/1000).toFixed(1)}t`,l:"Volume"},{v:session.items.length,l:"Exercises"}].map((m,i)=>html`
          ${i>0?html`<div style=${{width:1,background:C.border}}></div>`:""}

            <div class="M" style=${{fontSize:13,fontWeight:700,lineHeight:1}}>${m.v}</div>
            <div style=${{fontSize:8,color:C.faint,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",marginTop:2}}>${m.l}</div>
          </div>`)}

function RunScreen({session,setSession,onFinish,onCancel}){
  const[mode,setMode]=useState("manual");
  const[gpsOn,setGpsOn]=useState(false);
  const[gpsDist,setGpsDist]=useState(0);
  const[gpsTime,setGpsTime]=useState(0);
  const[dist,setDist]=useState("");
  const[time,setTime]=useState("");
  const[feeling,setFeeling]=useState("normal");
  const[gpsErr,setGpsErr]=useState(null);
  const watchRef=useRef(null),lastPos=useRef(null),timerRef=useRef(null);
  const hav=(a,b)=>{const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};
  const startGPS=()=>{if(!navigator.geolocation){setGpsErr("GPS not supported");return;}setGpsOn(true);setGpsDist(0);setGpsTime(0);lastPos.current=null;timerRef.current=setInterval(()=>setGpsTime(t=>t+1),1000);watchRef.current=navigator.geolocation.watchPosition(pos=>{const cur={lat:pos.coords.latitude,lon:pos.coords.longitude};if(lastPos.current){const d=hav(lastPos.current,cur);if(d>0.002)setGpsDist(p=>p+d);}lastPos.current=cur;},err=>{setGpsErr("GPS error: "+err.message);setGpsOn(false);},{enableHighAccuracy:true,maximumAge:2000});};
  const stopGPS=()=>{if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);if(timerRef.current)clearInterval(timerRef.current);setGpsOn(false);};
  useEffect(()=>()=>{if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);if(timerRef.current)clearInterval(timerRef.current);},[]);
  const km=mode==="gps"?+gpsDist.toFixed(2):parseFloat(dist)||0;
  const min=mode==="gps"?+(gpsTime/60).toFixed(1):parseFloat(time)||0;
  const pace=calcPace(km,min);
  const doSave=()=>{if(!km||!min)return;onFinish({...session,dur:Math.round(min),finishedAt:Date.now(),items:[{kind:"run",distance:km,time:min,pace,feeling}]});};
  return html`<div class="page aup" style="padding:16px 18px 40px">
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
      ${btn(onCancel,html`<${Ic} n="x" s=${22} c=${C.dim}/>`,{padding:8,margin:-8})}
      ${lbl("Running Session")}
      <div style="width:22px"></div>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
      ${[{id:"manual",label:"Manual",icon:"edit"},{id:"gps",label:"GPS",icon:"nav"}].map(m=>btn(()=>setMode(m.id),
        html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <${Ic} n=${m.icon} s=${15} c=${mode===m.id?C.blue:C.dim}/><span style=${{fontSize:13,fontWeight:700,color:mode===m.id?C.blue:C.dim}}>${m.label}</span></div>`,
        {width:"100%",padding:"12px 8px",borderRadius:13,background:mode===m.id?C.blueDim:C.card,
          border:`1px solid ${mode===m.id?C.blue:C.border}`,transition:"all .2s"}))}
    </div>
    ${mode==="gps"?html`
      ${gpsErr?html`<div style=${{color:C.red,fontSize:12,textAlign:"center",marginBottom:8}}>${gpsErr}</div>`:""}
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:18,marginBottom:10}}>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div style="text-align:center">${lbl("Distance",{marginBottom:4})}<div class="M" style=${{fontSize:34,fontWeight:700,color:C.green,lineHeight:1}}>${gpsDist.toFixed(2)}<span style=${{fontSize:13,color:C.dim}}> km</span></div></div>
          <div style="text-align:center">${lbl("Time",{marginBottom:4})}<div class="M" style=${{fontSize:34,fontWeight:700,color:C.blue,lineHeight:1}}>${fmtDur(gpsTime)}</div></div>
        </div>
        <div style=${{background:C.blueDim,borderRadius:14,padding:"14px 0",textAlign:"center"}}>
          ${lbl("Pace",{marginBottom:3})}
          <div class="D M" style=${{fontSize:44,fontWeight:800,lineHeight:1,color:pace==="--:--"?C.faint:C.text}}>${pace}</div>
          <div style=${{fontSize:11,color:C.dim,marginTop:3}}>min / km</div>
        </div>
      </div>
      ${!gpsOn?btn(startGPS,html`<${Ic} n="nav" s=${17} c="white"/> Start GPS`,
        {width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          background:C.green,color:"white",padding:14,borderRadius:13,fontWeight:700,fontSize:15}):
        btn(stopGPS,html`<${Ic} n="stop" s=${17} c="white"/> Stop GPS`,
        {width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          background:C.red,color:"white",padding:14,borderRadius:13,fontWeight:700,fontSize:15})}`:
    html`
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        ${[{l:"Distance",u:"km",v:dist,s:setDist,c:C.green},{l:"Time",u:"min",v:time,s:setTime,c:C.blue}].map(f=>html`
          <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14}}>
            ${lbl(f.l,{marginBottom:5})}
            <div style=${{display:"flex",alignItems:"baseline",gap:4}}>
              <input type="text" inputmode="decimal" placeholder="0" value=${f.v}
                onInput=${e=>f.s(e.target.value)} class="D M"
                style=${{fontSize:34,fontWeight:700,width:"65%",color:f.c}}/>
              <span style=${{fontSize:12,color:C.dim,fontWeight:600}}>${f.u}</span>
            </div>
          </div>`)}
      </div>
      <div style=${{background:`linear-gradient(135deg,${C.blueDim},rgba(34,197,94,.06))`,
        border:`1px solid ${C.border}`,borderRadius:16,padding:"18px 0",textAlign:"center",marginBottom:12}}>
        ${lbl("Pace",{marginBottom:6})}
        <div class="D M" style=${{fontSize:48,fontWeight:800,lineHeight:1,color:pace==="--:--"?C.faint:C.text}}>${pace}</div>
        <div style=${{fontSize:12,color:C.dim,marginTop:4}}>min / km</div>
      </div>`}
    <${FeelingPicker} value=${feeling} onChange=${setFeeling} style=${{marginBottom:20}}/>
    ${btn(doSave,"Save Run",{width:"100%",display:"block",background:(km&&min)?C.green:C.cardHi,
      color:"white",padding:15,borderRadius:13,fontWeight:700,fontSize:15,textAlign:"center",
      opacity:(km&&min)?1:.45,transition:"all .2s"},!km||!min)}
  </div>`;
}

}

function HistDetailModal({session,onClose}){
  const ti=TI[session.type]||TI.Push;
  const exercises=session.items.filter(i=>i.kind==="strength");
  const runs=session.items.filter(i=>i.kind==="run");
  const wods=session.items.filter(i=>i.kind==="wod");
  const d=new Date(session.date);
  return html`<${Sheet} onClose=${onClose}>
    <div class="D" style=${{fontSize:17,fontWeight:700,marginBottom:10}}>${session.type} ¬∑ ${d.toLocaleDateString("en-US",{month:"long",day:"numeric"})}</div>
    <div style=${{display:"flex",gap:7,marginBottom:12}}>
      ${session.dur?badge(`${session.dur}m`,ti.c):""}
      ${session.energy?badge(session.energy,ti.c):""}
    </div>
    ${exercises.map((ex,i)=>{
      const done=ex.sets?.filter(s=>s.done)||[];
      const vol=done.reduce((a,s)=>a+(s.w||0)*(s.r||0),0);
      return html`<div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:13,marginBottom:8}}>
        <div style=${{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <div style=${{fontSize:14,fontWeight:700}}>${ex.name}</div>
          ${vol>0?html`<span class="M" style=${{fontSize:12,fontWeight:700,color:ti.c}}>${vol}kg</span>`:""}
        </div>
        ${(ex.sets||[]).map((s,si)=>html`<div style=${{display:"flex",gap:10,padding:"4px 0",
          borderTop:`1px solid ${C.border}`,fontSize:12,color:s.done?C.text:C.dim}}>
          <span class="M" style=${{color:C.faint,width:18,textAlign:"center"}}>${si+1}</span>
          <span class="M" style=${{flex:1}}>${s.w}kg √ó ${s.r}</span>
          ${s.done?html`<${Ic} n="check" s=${12} c=${C.green} w=${3}/>` :""}
        </div>`)}
      </div>`;
    })}
    ${runs.map(r=>html`<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8}}>
      ${[{l:"Distance",v:`${r.distance}km`,c:C.green},{l:"Time",v:`${r.time}m`,c:C.blue},{l:"Pace",v:r.pace,c:C.yellow}].map(s=>html`
        <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
          <div class="M" style=${{fontSize:17,fontWeight:700,color:s.c,lineHeight:1}}>${s.v}</div>${lbl(s.l,{marginTop:4})}</div>`)}
    </div>`)}
    ${wods.map(w=>html`<div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:13}}>
      <span class="M" style=${{fontSize:13,fontWeight:800,color:C.red}}>${w.type}</span>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:8}}>
        ${[{l:"Rounds",v:w.rounds,c:C.red},{l:"Time",v:`${w.time}m`,c:C.blue},{l:"+Reps",v:w.extraReps,c:C.yellow}].map(s=>html`
          <div style="text-align:center"><div class="M" style=${{fontSize:20,fontWeight:700,color:s.c,lineHeight:1}}>${s.v}</div>${lbl(s.l,{marginTop:3})}</div>`)}
      </div>
    </div>`)}
    ${session.items.length===0?html`<div style=${{textAlign:"center",padding:"20px 0",color:C.faint,fontSize:13}}>No detailed logs.</div>`:""}
  <//>`;
}

function BackupModal({st,onClose,onImport}){
  const[creds,setCredsRaw]=useState(loadCreds);
  const[status,setStatus]=useState(null);
  const setCreds=c=>{setCredsRaw(c);saveCreds(c);};
  const setS=(t,m)=>{setStatus({t,m});if(t!=="loading")setTimeout(()=>setStatus(null),4000);};
  const doExport=()=>{exportJSON(st);setS("ok","File downloaded ‚úì");};
  const doImport=()=>importJSON(data=>{onImport(data);setS("ok","Data imported ‚úì");});
  const doSave=async()=>{setS("loading","Saving to cloud...");try{const id=await cloudSave(st,creds);const nc={...creds,binId:id};setCreds(nc);setS("ok",`Saved ‚úì Bin: ${id.slice(0,8)}...`);}catch(e){setS("err",e.message);}};
  const doLoad=async()=>{setS("loading","Loading from cloud...");try{const d=await cloudLoad(creds);onImport(d);setS("ok","Cloud data loaded ‚úì");}catch(e){setS("err",e.message);}};
  const sc={ok:C.green,err:C.red,loading:C.blue};
  return html`<${Sheet} onClose=${onClose}>
    <div class="D" style=${{fontSize:20,fontWeight:700,marginBottom:4}}>Backup & Sync</div>
    <div style=${{fontSize:12,color:C.faint,marginBottom:14}}>Auto-saves to browser. Use backup to never lose progress.</div>
    ${status?html`<div style=${{background:`${sc[status.t]}22`,border:`1px solid ${sc[status.t]}44`,
      borderRadius:10,padding:"9px 13px",marginBottom:12,display:"flex",alignItems:"center",gap:8,animation:"up .2s"}}>
      ${status.t==="loading"?html`<div style=${{width:14,height:14,borderRadius:"50%",border:`2px solid ${C.blue}`,borderTopColor:"transparent",animation:"spin .8s linear infinite"}}></div>`:
        html`<${Ic} n=${status.t==="ok"?"check":"x"} s=${14} c=${sc[status.t]} w=${3}/>`}
      <span style=${{fontSize:12,fontWeight:600,color:sc[status.t]}}>${status.m}</span>
    </div>`:""}
    ${lbl("üíæ Local File",{marginBottom:10})}
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
      ${[{l:"Export",sub:"Save .json file",n:"dl",c:C.green,fn:doExport},{l:"Import",sub:"Load .json file",n:"ul",c:C.blue,fn:doImport}].map(a=>btn(a.fn,html`
        <div style=${{textAlign:"center",width:"100%"}}>
          <${Ic} n=${a.n} s=${20} c=${a.c} style="margin:0 auto 6px"/>
          <div style=${{fontSize:13,fontWeight:700,color:a.c}}>${a.l}</div>
          <div style=${{fontSize:10,color:C.faint,marginTop:2}}>${a.sub}</div>
        </div>`,{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"13px 10px",textAlign:"center"}))}
    </div>
    ${lbl("‚òÅÔ∏è Cloud Sync (JSONBin)",{marginBottom:4})}
    <div style=${{fontSize:11,color:C.faint,marginBottom:10,lineHeight:1.5}}>Gratis di <span style=${{color:C.blue}}>jsonbin.io</span> ‚Üí daftar ‚Üí copy Master Key ‚Üí paste di bawah</div>
    <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:12,marginBottom:8}}>
      ${lbl("API Key / Master Key",{marginBottom:6})}
      <input type="password" placeholder="$2b$10$..." value=${creds.apiKey}
        onInput=${e=>setCreds({...creds,apiKey:e.target.value})}
        style=${{fontSize:12,color:C.text,letterSpacing:2}}/>
    </div>
    <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:12,marginBottom:12}}>
      ${lbl("Bin ID",{marginBottom:6})}
      <input type="text" placeholder="Auto-created on first save" value=${creds.binId}
        onInput=${e=>setCreds({...creds,binId:e.target.value})}
        style=${{fontSize:12,color:C.text}}/>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      ${btn(doSave,html`
        <div style=${{textAlign:"center",width:"100%"}}>
          <${Ic} n="cloud" s=${20} c=${creds.apiKey?C.blue:C.faint} style="margin:0 auto 6px"/>
          <div style=${{fontSize:13,fontWeight:700,color:creds.apiKey?C.blue:C.faint}}>Save Cloud</div>
          <div style=${{fontSize:10,color:C.faint,marginTop:2}}>Upload data</div>
        </div>`,
        {background:creds.apiKey?C.blueDim:C.card,border:`1px solid ${creds.apiKey?C.blue:C.border}`,borderRadius:13,padding:"13px 10px"},!creds.apiKey)}
      ${btn(doLoad,html`
        <div style=${{textAlign:"center",width:"100%"}}>
          <${Ic} n="sync" s=${20} c=${(creds.apiKey&&creds.binId)?C.green:C.faint} style="margin:0 auto 6px"/>
          <div style=${{fontSize:13,fontWeight:700,color:(creds.apiKey&&creds.binId)?C.green:C.faint}}>Load Cloud</div>
          <div style=${{fontSize:10,color:C.faint,marginTop:2}}>Download data</div>
        </div>`,
        {background:(creds.apiKey&&creds.binId)?C.greenDim:C.card,border:`1px solid ${(creds.apiKey&&creds.binId)?C.green:C.border}`,borderRadius:13,padding:"13px 10px"},!creds.apiKey||!creds.binId)}
    </div>
  <//>`;
}

render(html`<${App}/>`, document.getElementById("root"));
